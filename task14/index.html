<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bloom_shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
        <div class="nav-brand-name">
            <h1>BLOOM<span>SHOP</span></h1>
            <p>Contact</p>
        </div>
        <input type="checkbox" id="check" class="check-box">

            <label for="check" class="check-label">
                <span class="check-span"></span>
                <span class="check-span"></span>
                <span class="check-span"></span>
            </label>
        <div class="search-box">
            <div class="nav-input-div">
                <img src="assets/search icon.svg" alt="">
                <input type="text" class="nav-input" placeholder="Search products...">
            </div>
                
        </div>
        <div class="nav-buttons-cart">
            <img src="assets/shopping-cart.svg" alt="shopping-cart">
            <div class="nav-buttons">
                <button class="nav-signin-btn">Sign In</button>
                <button class="nav-signup-btn">Sign Up</button>
            </div>
        </div>
    </nav>
    </header>
</body>
</html>
