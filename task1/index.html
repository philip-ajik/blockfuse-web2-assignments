<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="image-side">
            <img src="Class Work img.jpeg" alt="The background main image" title="background">
        </div>

        <div class="form-side">
            <h2>Welcome to</h2>
            <h1>Design School</h1>


            <button class="social-btn">
                <img src="google icon.png" alt="The google icon"> Login with Google
            </button>

            <button class="social-btn">
                <img src="facebook icon.png" alt="The facebook ic"> Login with Facebook
            </button>

            <span>OR</span>


            <form action="#" method="post">
                <div>
                    <label>Email</label>
                    <input type="text" name="email">
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" name="password">
                </div>

                <div class="rem">
                    <input type="checkbox"> Remember me
                    <a href="">Forgot password?</a>
                </div>
                

                <input type="submit" name="login" value="Login">

            </form>
            <div>
                <p>Do you have an account? <a href="">Register</a></p>
            </div>
        </div>
    </div>
</body>

</html>
